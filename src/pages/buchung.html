<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Buchungsformular – CH70</title>

  <link rel="stylesheet" href="/src/css/styles.css" />
  <script defer src="/src/js/include.js"></script>
</head>
<body>

<header id="site-header"></header>

<main class="page">

  <section class="booking-form-page">
    <div class="container booking-form-container">

      <a href="/src/pages/termine.html" class="booking-back">← Zurück</a>

      <h1 class="booking-main-title">Buchungsformular</h1>

      <div class="booking-form-layout">

        <!-- LINKS -->
        <div class="booking-form-left">
          <h2>Kundendetails</h2>

          <div class="booking-login-note">
            Konto bereits vorhanden? <a href="#">Anmelden</a>
          </div>

         <form id="bookingForm" action="https://formspree.io/f/xvzlzoaj" method="POST">
          <input type="hidden" name="Datum" id="bookingDateInput">
<input type="hidden" name="Uhrzeit" id="bookingTimeInput">
 <input type="text" name="_gotcha" style="display:none">
 <input type="hidden" name="_redirect" value="http://127.0.0.1:5500/src/pages/danke.html">
           
            <div class="booking-form-row">
              <div class="form-group">
                <label for="firstName">Vorname *</label>
                <input id="firstName" name="firstName" type="text" />
              </div>

              <div class="form-group">
                <label for="lastName">Nachname *</label>
                <input id="lastName" name="lastName" type="text" />
              </div>
            </div>

            <div class="booking-form-row">
              <div class="form-group">
                <label for="phone">Telefonnummer für Rückfragen</label>
                <input id="phone" name="phone" type="text" />
              </div>

              <div class="form-group">
                <label for="email">E-Mail-Adresse *</label>
                <input id="email" name="email" type="email" />
              </div>
            </div>

            <div class="form-group">
              <label for="bookingMessage">Worum geht es? (optional)</label>
              <textarea id="bookingMessage" name="bookingMessage" rows="5"></textarea>
            </div>

            <div class="button-row">
              <button class="booking-request-button" type="submit">Buchung anfragen</button>
            </div>

            <div id="formStatus" class="form-status"></div>
          </form>
        </div>

        <!-- RECHTS -->
        <div class="booking-form-right">
          <h2>Buchungsdetails</h2>

          <div class="booking-side-box">
            <div class="booking-service-name">
              Kostenlose Beratung im<br>Pongau/Salzburg
            </div>

            <div class="booking-service-meta">
              20. April 2026 um 09:00
            </div>

            <details class="booking-more-info">
              <summary>Mehr Info</summary>
              <p>
                Persönliche und unverbindliche Erstberatung
                mit Überblick über die nächsten sinnvollen Schritte.
              </p>
            </details>

            <div class="booking-guideline-link">
              <a href="#">Richtlinie ansehen</a>
            </div>
          </div>
        </div>

      </div>
    </div>
  </section>

</main>

<footer id="site-footer"></footer>

</body>
</html>
